name: Update Moties

on:
  schedule:
    - cron: '0 8 * * *'   # 09:00 NL — ochtendscrape
    - cron: '0 17 * * *'  # 18:00 NL — na stemmingen (TK stemt meestal 14:00-17:00)
  workflow_dispatch:       # handmatig starten via GitHub UI

permissions:
  contents: write

jobs:
  fetch-moties:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Fetch moties van tweedekamer.nl
        run: python fetch_moties.py
        timeout-minutes: 20

      - name: Embed moties in index.html
        run: python embed_moties.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add moties.json index.html
          git diff --staged --quiet && echo "Geen wijzigingen" || (git commit -m "Auto-update: moties $(date +'%Y-%m-%d %H:%M')" && git push)
