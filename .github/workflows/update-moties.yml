name: Update Moties

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-moties:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch moties from tweedekamer.nl
        run: python fetch_moties.py

      - name: Embed moties into index.html
        run: python embed_moties.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add moties.json index.html
          git diff --staged --quiet && echo "Geen nieuwe moties" || (git commit -m "Auto-update: moties $(date +'%Y-%m-%d %H:%M')" && git push)
